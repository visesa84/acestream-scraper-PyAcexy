name: Release y Docker Hub Multi-Arch

on:
  push:
    tags:
      - 'v*'

jobs:
  release-and-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/acestream-scraper-pyacexy

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. CONSTRUCCIÓN DE LAS IMÁGENES TEMPORALES
      - name: Build AMD64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:temp-amd64
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

      - name: Build ARM64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./arm/arm64/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:temp-arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

      - name: Build ARMv7
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./arm/arm32/Dockerfile
          platforms: linux/arm/v7
          push: true
          provenance: false 
          tags: ${{ env.IMAGE_NAME }}:temp-armv7
          cache-from: type=gha,scope=armv7
          cache-to: type=gha,mode=max,scope=armv7

      # 2. CREACIÓN DE LOS MANIFIESTOS
      - name: Create and push Multi-Arch Manifests
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            ${{ env.IMAGE_NAME }}:temp-amd64 \
            ${{ env.IMAGE_NAME }}:temp-arm64 \
            ${{ env.IMAGE_NAME }}:temp-armv7
            
          docker buildx imagetools create -t ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      # 3. LIMPIEZA DE TAGS TEMPORALES
      - name: Delete temp tags from Docker Hub
        if: always()
        run: |
          # 1. Obtener el token de acceso usando el endpoint de login correcto
          TOKEN=$(curl -s -H "Content-Type: application/json" \
            -X POST \
            -d '{"username": "${{ secrets.DOCKERHUB_USERNAME }}", "password": "${{ secrets.DOCKERHUB_TOKEN }}"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)
          
          # Verificar si obtuvimos el token para evitar errores posteriores
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "Error: No se pudo obtener el token de Docker Hub. Revisa tus credenciales."
            exit 1
          fi

          # Borrar cada tag temporal usando la URL de la API de repositorios
          for TAG in temp-amd64 temp-arm64 temp-armv7; do
            echo "Intentando borrar tag: $TAG..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              -H "Authorization: JWT ${TOKEN}" \
              "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/${TAG}/")
            
            if [ "$HTTP_CODE" == "204" ]; then
              echo "Tag $TAG borrado con éxito."
            else
              echo "Tag $TAG no encontrado o error al borrar (Código: $HTTP_CODE). Saltando..."
            fi
          done

      # --- PASO PREVIO AL RELEASE ---
      - name: Extraer mensaje manual del tag
        id: tag_message
        run: |
          # Obtenemos el mensaje que escribiste al crear el tag (git tag -a v1.0.1 -m "Mi mensaje")
          MESSAGE=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
          # Si el mensaje está vacío, ponemos uno por defecto
          if [ -z "$MESSAGE" ]; then
            MESSAGE="New version ${{ github.ref_name }}"
          fi
          # Guardamos el mensaje en el output para usarlo en el siguiente paso
          echo "manual_text<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # --- 4. GITHUB RELEASE ---
      - name: Crear GitHub Release
        uses: ncipollo/release-action@v1
        with:
          body: |
            ${{ steps.tag_message.outputs.manual_text }}
            
            ---

          generateReleaseNotes: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

