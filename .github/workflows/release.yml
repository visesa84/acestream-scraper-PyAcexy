name: Release y Docker Hub

on:
  push:
    tags:
      - 'v*'

jobs:
  release-and-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extraer mensaje manual del tag
        id: tag_message
        run: |
          MESSAGE=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
          [ -z "$MESSAGE" ] && MESSAGE="Nueva versión ${{ github.ref_name }}"
          echo "manual_text<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/acestream-scraper-pyacexy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/acestream-scraper-pyacexy:${{ github.ref_name }}

      - name: Limpiar versiones antiguas de Docker Hub
        uses: snok/container-retention-policy@v2
        with:
          image-names: acestream-scraper-pyacexy
          cut-off: A day ago # No borra lo que se acaba de subir
          keep-at-least: 2    # Mantiene la versión nueva y la anterior (más la latest)
          account-type: personal
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Crear GitHub Release
        uses: ncipollo/release-action@v1
        with:
          body: |
            ${{ steps.tag_message.outputs.manual_text }}
            
            ---
          generateReleaseNotes: true
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
